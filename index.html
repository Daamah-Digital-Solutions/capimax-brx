  <body>
    <script>
      (function () {
        var patterns = ["chrome-extension://","moz-extension://","safari-extension://","metamask","inpage.js","contentscript","failed to connect to metamask","ethereum","web3"];
        function isExt(input, filename) {
          try {
            var s = (filename || "") + "\n";
            if (input == null) s += "";
            else if (typeof input === "string") s += input;
            else if (input instanceof Error) s += (input.message || "") + "\n" + (input.stack || "");
            else { try { s += JSON.stringify(input); } catch (e) { s += String(input); } }
            s = s.toLowerCase();
            for (var i = 0; i < patterns.length; i++) if (s.indexOf(patterns[i]) !== -1) return true;
          } catch (e) {}
          return false;
        }
        window.addEventListener("unhandledrejection", function (event) {
          if (isExt(event.reason)) { event.preventDefault(); event.stopImmediatePropagation(); return false; }
        }, true);
        window.addEventListener("error", function (event) {
          if (isExt(event.error || event.message, event.filename)) { event.preventDefault(); event.stopImmediatePropagation(); return false; }
        }, true);
      })();
    </script>
